data:
  dataset: circuitnet
  data_root: ~/shared/ctrl-nxp/CircuitNet-N28/micron_instance_placement/instance_placement/
  label_root: ~/shared/ctrl-nxp/CircuitNet-N28/training_set/congestion/label
  # label_root: ${hydra:runtime.cwd}/dataset/CircuitNet/train_DRC/DRC/label/ # for DRC

  num_workers: 8  # data loader workers (Original was 16 but 8 is recommended?)
  batch_size: 4  # batch size for training

experiment:
  project: circuitformer               # wandb project
  save_dir: /home/jovyan/shared/ctrl-nxp/CircuitFormer/exp/test_run           # log directory, will be created

  checkpoint_interval: 1000
  log_image_interval: 500
  ckpt_path: /home/jovyan/shared/ctrl-nxp/CircuitFormer/ckpts/circuitformer.ckpt

model:
  model_name: circuitformer
  loss: mse
  max_epochs: 20
  warmup_epochs: 2
  lr_scheduler: cosine
  lr: 0.0001
  warmup_lr: 0.000001
  min_lr: 0.000001
  weight_decay: 0
  batch_size: 4
  loss_weight: 128
  label_weight: 1



trainer:
  max_epochs: 20
  log_every_n_steps: 1
  accelerator: auto
  devices: auto
  precision: 16-mixed
  check_val_every_n_epoch: 1
  sync_batchnorm: False
  strategy: auto
  accumulate_grad_batches: 2
