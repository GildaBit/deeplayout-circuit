data:
  dataset: circuitnet
  data_root: /tmp/circuitnet_work/instance_placement/
  label_root: /home/jovyan/shared/ctrl-nxp/CircuitNet-N28/training_set/congestion/label/
  num_workers: 16
  batch_size: 8
experiment:
  project: circuitformer
  save_dir: ${hydra:runtime.cwd}/exp/exp1
  checkpoint_interval: 1000
  log_image_interval: 500
  ckpt_path: ${hydra:runtime.cwd}/ckpts/circuitformer.ckpt
model:
  model_name: circuitformer
  loss: mse
  max_epochs: 100
  warmup_epochs: 10
  lr_scheduler: cosine
  lr: 0.0001
  warmup_lr: 1.0e-06
  min_lr: 1.0e-06
  weight_decay: 0
  batch_size: ${data.batch_size}
  loss_weight: 128
  label_weight: 1
trainer:
  max_epochs: ${model.max_epochs}
  log_every_n_steps: 1
  accelerator: gpu
  devices:
  - 0
  precision: 16
  check_val_every_n_epoch: 10
  sync_batchnorm: true
